name: smartflow
version: "1.0.0"
config-version: 2

profile: smartflow

model-paths: ["models"]
test-paths: ["tests"]
macro-paths: ["macros"]

target-path: "target"
clean-targets: ["target", "dbt_packages"]

models:
  smartflow:
    staging:
      +schema: staging
      +materialized: view
    marts:
      +schema: marts
      +materialized: table
    metrics:
      +schema: metrics
      +materialized: table
